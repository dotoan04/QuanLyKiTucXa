services:
  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ktx_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ktx_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ktx_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ktx_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ChromaDB (Vector Store cho Chatbot RAG) ────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: ktx_chromadb
    restart: unless-stopped
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ── Backend API ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ktx_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ktx_db?schema=public
      REDIS_URL: redis://redis:6379
      CHROMADB_URL: http://chromadb:8000
      # URL trình duyệt thật (CORS + link email). Không dùng http://frontend:3000 — browser gửi Origin: localhost:3000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      # Thêm origin nội bộ nếu cần (SSR/server gọi API có Origin)
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://frontend:3000}
      # ── Credentials & secrets (từ root .env) ──
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-deepseek/deepseek-v3.2}
      # ── DeepSeek V4 Flash (chat LLM trực tiếp). Embedding vẫn dùng OpenRouter ở trên. ──
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      DEEPSEEK_LIGHT_MODEL: ${DEEPSEEK_LIGHT_MODEL:-deepseek-v4-flash}
      DEEPSEEK_INTENT_MODEL: ${DEEPSEEK_INTENT_MODEL:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      CHAT_LLM_PROVIDER: ${CHAT_LLM_PROVIDER:-}
      DEEPSEEK_REASONING: ${DEEPSEEK_REASONING:-0}
      DEEPSEEK_REASONING_EFFORT: ${DEEPSEEK_REASONING_EFFORT:-high}
      CHROMADB_COLLECTION: ${CHROMADB_COLLECTION:-ktx_knowledge_base}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE:-}
      VNPAY_SECRET_KEY: ${VNPAY_SECRET_KEY:-}
      VNPAY_URL: ${VNPAY_URL:-}
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL:-}
    ports:
      - "3001:3001"
    volumes:
      - upload_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Frontend (Next.js) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    container_name: ktx_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    ports:
      - "3000:3000"

# ── Volumes ───────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  chroma_data:
  upload_data:
